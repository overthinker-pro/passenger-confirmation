<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrants | Bethany Tour 2026</title>
    <meta
      name="description"
      content="Fetch and view Bethany Tour registrants from Google Sheets."
    />
    <link rel="stylesheet" href="registrants.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="page-loader"
      id="fetch-loader"
      role="status"
      aria-hidden="false"
    >
      <div class="page-loader__mark" aria-hidden="true">
        <span class="page-loader__ring"></span>
        <span class="page-loader__ring page-loader__ring--two"></span>
        <span class="page-loader__monogram">B</span>
      </div>
      <div class="page-loader__copy">
        <span class="page-loader__eyebrow">Bethany Tour 2026</span>
        <strong>Preparing member list</strong>
      </div>
      <div class="page-loader__bar" aria-hidden="true"></div>
    </div>

    <main class="registrants-page">
      <section class="welcome-hero" aria-labelledby="fetch-title">
        <a
          class="back-home"
          href="../index.html"
          aria-label="Go back to homepage"
        >
          <span aria-hidden="true">←</span>
        </a>

        <div class="welcome-hero__copy">
          <p class="welcome-kicker">Bethany Tour 2026</p>
          <h1>Registered Members</h1>
          <p class="welcome-lead">
            View the final list of registered adults and students for the tour
            in one place.
          </p>
        </div>

        <div class="welcome-hero__action">
          <p class="fetch-status" id="fetch-status" aria-live="polite"></p>
        </div>
      </section>

      <section class="lists-grid" aria-label="Registrant lists">
        <article class="list-card">
          <div class="list-card__head">
            <div>
              <p class="panel-label">Adults</p>
              <h2>Registered Adults</h2>
            </div>
            <span class="list-count" id="adult-total">0</span>
          </div>
          <ol class="name-list" id="adult-list">
            <li class="empty-state">No adult names loaded yet.</li>
          </ol>
        </article>

        <article class="list-card">
          <div class="list-card__head">
            <div>
              <p class="panel-label">Students</p>
              <h2>Registered Students</h2>
            </div>
            <span class="list-count" id="student-total">0</span>
          </div>
          <ol class="name-list" id="student-list">
            <li class="empty-state">No student names loaded yet.</li>
          </ol>
        </article>
      </section>
    </main>

    <script src="registrants.js"></script>
  </body>
</html>
