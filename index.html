<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bethany Tour 2026</title>
    <meta
      name="description"
      content="Bethany Tour 2026 details are being updated."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <style>
      :root {
        --page: #f7f9f6;
        --surface: rgba(255, 255, 255, 0.86);
        --ink: #17211d;
        --muted: #65716c;
        --line: rgba(23, 33, 29, 0.1);
        --green: #345f4b;
        --green-deep: #173d30;
        --gold: #b78a45;
        --shadow: 0 32px 80px rgba(35, 48, 42, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 18% 24%,
            rgba(52, 95, 75, 0.12),
            transparent 24rem
          ),
          radial-gradient(
            circle at 82% 76%,
            rgba(183, 138, 69, 0.18),
            transparent 26rem
          ),
          linear-gradient(180deg, #fbfcfa 0%, var(--page) 54%, #eef4ef 100%);
        color: var(--ink);
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(23, 33, 29, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 33, 29, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.42),
          transparent 78%
        );
      }

      .construction-page {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
      }

      .construction-card {
        position: relative;
        width: min(100%, 760px);
        overflow: hidden;
        padding: clamp(34px, 7vw, 70px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.94),
            rgba(255, 255, 255, 0.76)
          ),
          var(--surface);
        box-shadow: var(--shadow);
        text-align: center;
        backdrop-filter: blur(16px);
      }

      .construction-card::after {
        content: "";
        position: absolute;
        right: -100px;
        top: -130px;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: rgba(183, 138, 69, 0.14);
      }

      .eyebrow {
        position: relative;
        z-index: 1;
        display: inline-flex;
        margin: 0;
        padding: 8px 14px;
        border: 1px solid rgba(183, 138, 69, 0.3);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--green-deep);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        position: relative;
        z-index: 1;
        margin: 20px auto 16px;
        max-width: 680px;
        color: var(--green-deep);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(3rem, 9vw, 6rem);
        font-weight: 700;
        line-height: 0.9;
      }

      .message {
        position: relative;
        z-index: 1;
        max-width: 560px;
        margin: 0 auto;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.14rem);
        line-height: 1.8;
      }

      .tour-buddy {
        position: relative;
        z-index: 1;
        display: grid;
        justify-items: center;
        gap: 14px;
        margin: 28px auto 0;
      }

      .buddy-note {
        position: relative;
        max-width: 280px;
        margin: 0;
        padding: 12px 16px;
        border: 1px solid rgba(183, 138, 69, 0.24);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--green-deep);
        font-size: 0.86rem;
        font-weight: 700;
        line-height: 1.5;
        box-shadow: 0 14px 30px rgba(35, 48, 42, 0.08);
      }

      .buddy-note::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -8px;
        width: 14px;
        height: 14px;
        border-right: 1px solid rgba(183, 138, 69, 0.24);
        border-bottom: 1px solid rgba(183, 138, 69, 0.24);
        background: rgba(255, 255, 255, 0.72);
        transform: translateX(-50%) rotate(45deg);
      }

      .buddy-illustration {
        position: relative;
        width: 132px;
        height: 118px;
        animation: buddy-breathe 2.8s ease-in-out infinite;
      }

      .buddy-shadow {
        position: absolute;
        left: 28px;
        bottom: 3px;
        width: 78px;
        height: 12px;
        border-radius: 50%;
        background: rgba(23, 33, 29, 0.1);
        filter: blur(2px);
      }

      .buddy-suitcase {
        position: absolute;
        right: 8px;
        bottom: 12px;
        width: 44px;
        height: 38px;
        border: 2px solid rgba(23, 61, 48, 0.42);
        border-radius: 8px;
        background: linear-gradient(180deg, #f6ead8, #e8d2ad);
      }

      .buddy-suitcase::before {
        content: "";
        position: absolute;
        top: -13px;
        left: 12px;
        width: 16px;
        height: 12px;
        border: 2px solid rgba(23, 61, 48, 0.36);
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
      }

      .buddy-suitcase::after {
        content: "";
        position: absolute;
        inset: 8px auto 8px 50%;
        width: 2px;
        background: rgba(23, 61, 48, 0.18);
      }

      .buddy-body {
        position: absolute;
        left: 26px;
        bottom: 14px;
        width: 70px;
        height: 54px;
        border: 2px solid rgba(23, 61, 48, 0.22);
        border-radius: 32px 32px 24px 24px;
        background:
          radial-gradient(
            circle at 30% 28%,
            rgba(183, 138, 69, 0.34),
            transparent 18px
          ),
          #fffaf0;
        box-shadow: 0 16px 30px rgba(35, 48, 42, 0.09);
      }

      .buddy-head {
        position: absolute;
        left: 34px;
        top: 20px;
        width: 58px;
        height: 54px;
        border: 2px solid rgba(23, 61, 48, 0.22);
        border-radius: 48% 48% 44% 44%;
        background: #fffaf0;
        box-shadow: 0 12px 28px rgba(35, 48, 42, 0.08);
      }

      .buddy-ear {
        position: absolute;
        top: 18px;
        width: 24px;
        height: 34px;
        border: 2px solid rgba(23, 61, 48, 0.2);
        background: #e7c99c;
      }

      .buddy-ear--left {
        left: 19px;
        border-radius: 18px 8px 18px 18px;
        transform: rotate(-18deg);
      }

      .buddy-ear--right {
        right: 31px;
        border-radius: 8px 18px 18px 18px;
        transform: rotate(18deg);
      }

      .buddy-face {
        position: absolute;
        left: 50px;
        top: 43px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green-deep);
        box-shadow: 22px 0 0 var(--green-deep);
      }

      .buddy-face::after {
        content: "";
        position: absolute;
        left: 8px;
        top: 12px;
        width: 12px;
        height: 8px;
        border-bottom: 2px solid rgba(23, 61, 48, 0.5);
        border-radius: 0 0 12px 12px;
      }

      .buddy-nose {
        position: absolute;
        left: 61px;
        top: 52px;
        width: 10px;
        height: 7px;
        border-radius: 50%;
        background: var(--green-deep);
      }

      .buddy-tail {
        position: absolute;
        left: 13px;
        bottom: 52px;
        width: 28px;
        height: 20px;
        border-top: 4px solid rgba(183, 138, 69, 0.76);
        border-radius: 50%;
        transform-origin: right bottom;
        animation: tail-wag 1.4s ease-in-out infinite;
      }

      .ornament {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 34px;
      }

      .ornament span {
        display: block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0.42;
      }

      .ornament span:nth-child(2) {
        width: 42px;
        height: 1px;
        border-radius: 999px;
        background: var(--green);
        opacity: 0.34;
      }

      @media (max-width: 560px) {
        .construction-page {
          padding: 18px;
        }

        .buddy-note {
          max-width: 240px;
        }
      }

      @keyframes buddy-breathe {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-4px);
        }
      }

      @keyframes tail-wag {
        0%,
        100% {
          transform: rotate(-18deg);
        }

        50% {
          transform: rotate(10deg);
        }
      }
    </style>
    <main class="construction-page" aria-labelledby="construction-title">
      <section class="construction-card">
        <p class="eyebrow">Bethany Tour 2026</p>
        <h1 id="construction-title">Page Under Construction</h1>
        <p class="message">
          We are also thrilled for the tour. The details are being updated here,
          so please come back after sometime.
        </p>
        <div
          class="tour-buddy"
          aria-label="A small tour companion is waiting with you"
        >
          <p class="buddy-note">
            I packed a tiny bag too. We will be ready soon.
          </p>
          <div class="buddy-illustration" aria-hidden="true">
            <span class="buddy-shadow"></span>
            <span class="buddy-suitcase"></span>
            <span class="buddy-tail"></span>
            <span class="buddy-body"></span>
            <span class="buddy-ear buddy-ear--left"></span>
            <span class="buddy-ear buddy-ear--right"></span>
            <span class="buddy-head"></span>
            <span class="buddy-face"></span>
            <span class="buddy-nose"></span>
          </div>
        </div>
        <div class="ornament" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </main>
  </body>
</html>
