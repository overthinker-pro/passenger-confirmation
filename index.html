<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bethany Tour 2026</title>
    <meta
      name="description"
      content="Bethany Tour 2026 registration summary."
    />
    <link rel="stylesheet" href="closed.css" />
  </head>
  <body>
    <main class="single-page" data-adults="15" data-students="11">
      <section class="hero-card" aria-labelledby="tour-title">
        <p class="eyebrow">Bethany Tour 2026</p>
        <h1 id="tour-title">Bethany Sunday School Tour 2026</h1>
        <p class="trail-name">Coastal Heritage Trail</p>
      </section>

      <section class="count-card" aria-labelledby="count-title">
        <div class="section-copy">
          <p class="eyebrow eyebrow-soft">Registration Count</p>
          <h2 id="count-title">Current registered members</h2>
          <p class="status-text" id="status-text" aria-live="polite">
            Loading registration count...
          </p>
        </div>

        <div class="count-grid" aria-label="Registration counts">
          <article class="count-item">
            <span class="count-label">Adults</span>
            <strong class="count-value" id="adult-count">0</strong>
          </article>

          <article class="count-item">
            <span class="count-label">Students</span>
            <strong class="count-value" id="student-count">0</strong>
          </article>

          <article class="count-item count-item-total">
            <span class="count-label">Total</span>
            <strong class="count-value" id="total-count">0</strong>
          </article>
        </div>
      </section>
    </main>

    <script src="closed.js"></script>
  </body>
</html>
