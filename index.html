<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      padding: 40px 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 25px;
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 15px;
    }

    .footer {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 20px;
    }

    .bounce {
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background: #fff;
      color: #3b82f6;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .button:hover {
      background: #facc15;
      color: #000;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="emoji bounce">🚧✨</div>
    <h1>Coming Soon!</h1>
    <p>Our page is currently under construction, we'll be back soon! 🎉</p>

    <a href="#" class="button">Check Back Later</a>

    <div class="footer">
      Thanks for your patience!
    </div>
  </div>

</body>
</html>
