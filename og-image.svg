<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Bethany Tour 2026 Public Voting</title>
  <desc id="desc">A share preview image for the Bethany Tour 2026 public voting page.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe4" />
      <stop offset="55%" stop-color="#f6f2ec" />
      <stop offset="100%" stop-color="#eef5f4" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d76c3d" />
      <stop offset="50%" stop-color="#5c91ff" />
      <stop offset="100%" stop-color="#1f7a4c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f2937" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1080" cy="72" r="120" fill="#ffd7ba" opacity="0.55" />
  <circle cx="96" cy="566" r="138" fill="#bdd9ff" opacity="0.48" />

  <rect x="68" y="62" width="1064" height="506" rx="36" fill="#fffaf2" fill-opacity="0.82" filter="url(#shadow)" />

  <text x="110" y="170" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="32" font-weight="700" fill="#5b6472">
    Bethany Tour 2026
  </text>

  <text x="106" y="300" font-family="Space Grotesk, Arial, sans-serif" font-size="86" font-weight="700" letter-spacing="-3" fill="#1f2937">
    Public Voting
  </text>

  <text x="110" y="382" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="34" font-weight="500" fill="#5b6472">
    Pick the trip. Vote anonymously. Follow live results.
  </text>

  <rect x="106" y="470" width="520" height="12" rx="6" fill="url(#accent)" />
</svg>
